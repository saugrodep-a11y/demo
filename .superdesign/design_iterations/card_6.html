<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dark Luxe · Immersive Portrait Cards</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{
    --bg:#0e0e16;
    --gold:#cdb583;        /* 冷金点睛 */
    --gold-soft:#d8c79c;
    --ink:#05060b;
  }
  *{box-sizing:border-box}
  body{
    background:var(--bg);
    font-family:"Inter","Segoe UI",-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    color:#fff;
    -webkit-font-smoothing:antialiased;
  }
  /* 半衬线数字感 */
  .num{
    font-family:"Iowan Old Style","Palatino Linotype",Georgia,"Times New Roman",serif;
    font-feature-settings:"lnum" 1, "tnum" 1;
    letter-spacing:.01em;
  }
  .tracking-luxe{letter-spacing:.32em}
  .tracking-mid{letter-spacing:.18em}

  /* ---------- 卡牌外壳：竖向 3:4.2，靠光影而非边框分离 ---------- */
  .card{
    position:relative;
    aspect-ratio:3/4.2;
    border-radius:18px;
    overflow:hidden;
    isolation:isolate;
    border:1px solid rgba(205,181,131,.14);  /* 1px 冷金细描边 */
    background:#07070d;
    box-shadow:0 24px 60px -28px rgba(0,0,0,.9);
    transition:transform .5s cubic-bezier(.2,.7,.2,1), border-color .5s;
  }
  .card:hover{transform:translateY(-6px);border-color:rgba(205,181,131,.34)}

  /* ---------- 立绘：纯 CSS 营造逆光/侧光戏剧构图 ---------- */
  .art{position:absolute;inset:0;z-index:0}
  /* 大气氛围底：从顶部冷光到底部深暗，制造逆光 */
  .art-base{position:absolute;inset:0}
  /* 戏剧性逆光光柱 */
  .rim{position:absolute;inset:0;mix-blend-mode:screen;opacity:.9}
  /* 人物剪影（几何构成肩颈/头部，营造立绘而非平涂） */
  .figure{position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:128%;height:86%}
  /* 暗部压底，让左下/右下文字可读，但不是实色信息条 */
  .vignette{
    position:absolute;inset:0;
    background:
      radial-gradient(120% 80% at 50% 0%, rgba(255,255,255,.06), transparent 55%),
      linear-gradient(180deg, transparent 42%, rgba(5,6,11,.55) 74%, rgba(5,6,11,.92) 100%),
      linear-gradient(90deg, rgba(5,6,11,.55), transparent 26%, transparent 74%, rgba(5,6,11,.55));
  }
  /* 细颗粒质感，去塑料感 */
  .grain{
    position:absolute;inset:0;opacity:.05;mix-blend-mode:overlay;pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,.9) .5px, transparent .6px);
    background-size:3px 3px;
  }

  /* ---------- 四角信息：直接浮在画面，极轻盈 ---------- */
  .corner{position:absolute;z-index:3}
  .tl{top:18px;left:18px;right:64px}
  .tr{top:18px;right:18px}
  .bl{left:18px;bottom:18px}
  .br{right:18px;bottom:18px;text-align:right}

  .name{
    font-weight:600;font-size:19px;line-height:1.05;
    text-shadow:0 1px 10px rgba(0,0,0,.65);
  }
  .subname{
    font-size:9.5px;color:var(--gold-soft);
    text-shadow:0 1px 6px rgba(0,0,0,.7);
  }
  .name-rule{height:1px;width:34px;background:linear-gradient(90deg,var(--gold),transparent);margin-top:7px;opacity:.7}

  /* 法力：分段点阵，单色冷金 */
  .mana{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
  .pips{display:flex;gap:3px}
  .pip{width:5px;height:11px;border-radius:2px;background:rgba(255,255,255,.16)}
  .pip.on{background:var(--gold);box-shadow:0 0 0 .5px rgba(0,0,0,.4)}
  .mana-val{font-size:10px;color:var(--gold-soft);text-shadow:0 1px 6px rgba(0,0,0,.7)}

  /* 攻击/血量：数值优雅有分量，浮在立绘上，仅极轻可读阴影 */
  .stat{display:flex;align-items:center;gap:7px}
  .stat svg{width:16px;height:16px;flex:none}
  .stat .v{
    font-size:32px;font-weight:600;line-height:.9;
    text-shadow:0 2px 14px rgba(0,0,0,.8),0 0 1px rgba(0,0,0,.6);
  }
  .icon-atk{color:#e9ecf2}
  .icon-hp{color:#f0e9e9}

  /* 护甲：叠在血量上方，极简 */
  .armor{display:flex;align-items:center;justify-content:flex-end;gap:5px;margin-bottom:6px}
  .armor svg{width:12px;height:12px;color:var(--gold-soft)}
  .armor .v{font-size:14px;font-weight:600;color:#eef1f6;text-shadow:0 1px 8px rgba(0,0,0,.8)}

  /* 顶部细装饰：极细冷金线，呼应收藏卡 */
  .topline{position:absolute;top:0;left:0;right:0;height:1px;z-index:3;
    background:linear-gradient(90deg,transparent,rgba(205,181,131,.5),transparent)}

  .label{font-size:8.5px;color:rgba(255,255,255,.45)}
</style>
</head>
<body class="min-h-screen">

  <!-- 隐藏的 SVG 图标定义 -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="i-sword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.5 3.5 20.5 9.5 9 21l-3 0 0-3 8.5-14.5Z"/>
        <path d="M6 18l-2.5 2.5"/><path d="M4 14l6 6"/>
      </symbol>
      <symbol id="i-heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20s-7-4.6-9.2-9C1.3 8 2.6 4.8 6 4.8c2 0 3.2 1.2 4 2.3.8-1.1 2-2.3 4-2.3 3.4 0 4.7 3.2 3.2 6.2C19 15.4 12 20 12 20Z"/>
      </symbol>
      <symbol id="i-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3 19 6v6c0 4.2-3 7.2-7 9-4-1.8-7-4.8-7-9V6l7-3Z"/>
      </symbol>
    </defs>
  </svg>

  <div class="max-w-[1180px] mx-auto px-6 py-16">

    <!-- 标题 -->
    <header class="mb-12">
      <p class="tracking-luxe text-[11px]" style="color:var(--gold-soft)">DARK LUXE · IMMERSIVE PORTRAIT</p>
      <h1 class="text-2xl font-semibold mt-2 tracking-mid">缄默序列 · TEAM ASSEMBLY</h1>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-[420px_1fr] gap-16 items-start">

      <!-- 左：一个队伍 = 4 张竖向卡 -->
      <section>
        <p class="label tracking-mid mb-4">DEPLOYED · 04</p>
        <div class="grid grid-cols-2 gap-4" id="team"></div>
      </section>

      <!-- 右：放大展示 1 张看清四角排版 -->
      <section>
        <p class="label tracking-mid mb-4">FEATURED · 看清四角排版</p>
        <div class="w-full max-w-[420px]" id="feature"></div>
        <div class="mt-6 grid grid-cols-2 gap-x-8 gap-y-2 max-w-[420px] text-[11px]" style="color:rgba(255,255,255,.5)">
          <span>↖ 角色名字</span><span class="text-right">↗ 法力值（分段点阵）</span>
          <span>↙ 攻击力 ⚔</span><span class="text-right">↘ 血量 ❤ · 护甲叠于其上</span>
        </div>
      </section>

    </div>
  </div>

<script>
  // ----- 模拟数据 -----
  const cards = [
    { name:"NOIR",   sub:"寒鸦 · The Raven",     atk:7, hp:42, mana:[12,12], armor:0,  hue:"raven" },
    { name:"SELENE", sub:"月隐 · Lunar Veil",     atk:5, hp:38, mana:[8,12],  armor:12, hue:"moon"  },
    { name:"VESPER", sub:"暮钟 · Last Bell",      atk:9, hp:41, mana:[12,12], armor:0,  hue:"ember" },
    { name:"MUTE",   sub:"缄默 · Silent One",     atk:4, hp:40, mana:[10,12], armor:0,  hue:"jade"  },
  ];

  // 不同角色的戏剧性光影配色（逆光/侧光）
  const palettes = {
    raven:{ base:"radial-gradient(130% 95% at 50% 18%, #2a2f45 0%, #131525 45%, #07070d 100%)",
            rim:"radial-gradient(60% 80% at 78% 14%, rgba(150,170,220,.55), transparent 60%)",
            figA:"#39415e", figB:"#161a2b", skin:"#cfd6e6" },
    moon:{  base:"radial-gradient(130% 95% at 50% 16%, #34384b 0%, #181a26 46%, #07070d 100%)",
            rim:"radial-gradient(55% 75% at 24% 18%, rgba(200,210,235,.5), transparent 62%)",
            figA:"#4a5168", figB:"#1c2030", skin:"#dfe3ee" },
    ember:{ base:"radial-gradient(130% 95% at 50% 18%, #3a2a2c 0%, #1d1622 46%, #07070d 100%)",
            rim:"radial-gradient(60% 80% at 74% 16%, rgba(210,150,120,.5), transparent 60%)",
            figA:"#5a3f3f", figB:"#241820", skin:"#e8d2c6" },
    jade:{  base:"radial-gradient(130% 95% at 50% 18%, #243733 0%, #131e20 46%, #07070d 100%)",
            rim:"radial-gradient(58% 78% at 30% 16%, rgba(150,210,190,.45), transparent 62%)",
            figA:"#33524a", figB:"#152120", skin:"#d3e2da" },
  };

  function manaPips(cur,max){
    let h="";
    for(let i=0;i<max;i++){ h+=`<span class="pip ${i<cur?'on':''}"></span>`; }
    return h;
  }

  // SVG 立绘人物：肩/颈/头剪影 + 侧光，营造立绘构图（非平涂）
  function figureSVG(p){
    return `
    <svg class="figure" viewBox="0 0 200 200" preserveAspectRatio="xMidYMax meet">
      <defs>
        <linearGradient id="g_${p.figA.slice(1)}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="${p.figA}"/>
          <stop offset="1" stop-color="${p.figB}"/>
        </linearGradient>
        <linearGradient id="rim_${p.figA.slice(1)}" x1="1" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="${p.skin}" stop-opacity=".9"/>
          <stop offset=".5" stop-color="${p.skin}" stop-opacity="0"/>
        </linearGradient>
        <radialGradient id="head_${p.figA.slice(1)}" cx="0.4" cy="0.35" r="0.8">
          <stop offset="0" stop-color="${p.skin}" stop-opacity=".55"/>
          <stop offset="1" stop-color="${p.figB}"/>
        </radialGradient>
      </defs>
      <!-- 披风/肩 -->
      <path d="M-10 200 C 10 130, 40 108, 100 104 C 160 108, 190 130, 210 200 Z"
            fill="url(#g_${p.figA.slice(1)})"/>
      <!-- 侧光描边（冷光打在肩部轮廓） -->
      <path d="M-10 200 C 10 130, 40 108, 100 104 C 160 108, 190 130, 210 200"
            fill="none" stroke="url(#rim_${p.figA.slice(1)})" stroke-width="2"/>
      <!-- 颈 -->
      <path d="M86 112 L86 92 Q100 100 114 92 L114 112 Z" fill="${p.figB}"/>
      <!-- 头 -->
      <ellipse cx="100" cy="74" rx="26" ry="30" fill="url(#head_${p.figA.slice(1)})"/>
      <!-- 头发暗部 -->
      <path d="M74 74 Q74 40 100 40 Q126 40 126 74 Q126 56 100 56 Q74 56 74 74 Z" fill="${p.figB}" opacity=".85"/>
      <!-- 逆光发丝高光 -->
      <path d="M122 60 Q128 74 120 92" fill="none" stroke="${p.skin}" stroke-opacity=".5" stroke-width="1.4"/>
    </svg>`;
  }

  function cardHTML(c){
    const p = palettes[c.hue];
    return `
    <div class="card">
      <div class="topline"></div>
      <div class="art">
        <div class="art-base" style="background:${p.base}"></div>
        <div class="rim" style="background:${p.rim}"></div>
        ${figureSVG(p)}
        <div class="vignette"></div>
        <div class="grain"></div>
      </div>

      <!-- 左上 名字 -->
      <div class="corner tl">
        <div class="name tracking-mid">${c.name}</div>
        <div class="subname tracking-mid mt-1">${c.sub}</div>
        <div class="name-rule"></div>
      </div>

      <!-- 右上 法力 -->
      <div class="corner tr">
        <div class="mana">
          <div class="pips">${manaPips(c.mana[0],c.mana[1])}</div>
          <div class="mana-val num">${c.mana[0]} / ${c.mana[1]}</div>
        </div>
      </div>

      <!-- 左下 攻击 -->
      <div class="corner bl">
        <div class="stat">
          <svg class="icon-atk"><use href="#i-sword"/></svg>
          <span class="v num">${c.atk}</span>
        </div>
      </div>

      <!-- 右下 血量（+护甲叠上方） -->
      <div class="corner br">
        ${c.armor>0 ? `<div class="armor"><svg><use href="#i-shield"/></svg><span class="v num">${c.armor}</span></div>` : ``}
        <div class="stat" style="justify-content:flex-end">
          <svg class="icon-hp"><use href="#i-heart"/></svg>
          <span class="v num">${c.hp}</span>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('team').innerHTML = cards.map(cardHTML).join('');
  document.getElementById('feature').innerHTML = cardHTML(cards[1]); // 带护甲那张放大
</script>
</body>
</html>
